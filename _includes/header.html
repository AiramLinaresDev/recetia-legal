{% assign is_home = false %}{% if page.url == "/" %}{% assign is_home = true %}{% endif %}
<header class="site-header{% unless is_home %} site-header--legal{% endunless %}">
  <div class="container nav">
    <a class="brand" href="{{ '/' | relative_url }}">
      <img src="{{ '/assets/img/logo.png' | relative_url }}" alt="Logo de RecetIA" width="34" height="34">
      <span>RecetIA</span>
    </a>

    {% if is_home %}
    <nav class="nav-links" id="navLinks" aria-label="Navegación principal">
      <a href="#caracteristicas">Características</a>
      <a href="#capturas">La app</a>
      <a href="#legal-links">Legal</a>
    </nav>
    <div class="nav-cta">
      <a class="btn btn--primary btn--active" href="#waitlist">Avísame</a>
      <button class="nav-toggle" id="navToggle" aria-label="Abrir menú" aria-controls="navLinks" aria-expanded="false">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M4 7h16M4 12h16M4 17h16"/></svg>
      </button>
    </div>
    {% else %}
    <nav class="nav-links" aria-label="Navegación principal">
      <a href="{{ '/' | relative_url }}">Inicio</a>
      <a href="{{ '/legal/privacidad/' | relative_url }}">Privacidad</a>
      <a href="{{ '/legal/terminos/' | relative_url }}">Términos</a>
    </nav>
    <div class="nav-cta">
      <a class="btn btn--ghost" href="{{ '/' | relative_url }}">Volver al inicio</a>
    </div>
    {% endif %}
  </div>
</header>
